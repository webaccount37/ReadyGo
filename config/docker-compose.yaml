version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: readygo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: readygo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: readygo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: readygo-backend
    # Load environment variables from backend/.env file
    env_file:
      - ../backend/.env
    environment:
      # Override database URL for Docker network
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/readygo
      REDIS_URL: redis://redis:6379/0
      # Override CORS for Docker setup (can be overridden in .env)
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000","http://127.0.0.1:3000"]'
      # OTEL collector is optional - removed to avoid connection errors when not running
      # Override redirect URI for Docker (if needed)
      # AZURE_REDIRECT_URI: http://localhost:8000/api/v1/auth/callback
      # PFX lives on host under backend/; volume maps that to /app (Windows paths in .env are invalid in Linux containers)
      AZURE_SP_REST_CLIENT_CERTIFICATE_PATH: /app/app.pfx
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      # Calendar Excel sync: `docker compose exec backend python -m scripts.sync_calendars_from_uploads --uploads-dir /uploads --execute`
      - ../uploads:/uploads:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend: put NEXT_PUBLIC_AZURE_* in ../frontend/.env.local — it is included in the build
  # context (see frontend/.dockerignore). Rebuild after changing it: docker compose build --no-cache frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Empty = use relative URLs, proxied by Next.js to backend (fixes 404 when accessing via IP/hostname)
        NEXT_PUBLIC_API_URL: ""
        # Baked in at build time - Next.js rewrites are evaluated during build, not runtime
        BACKEND_URL: http://backend:8000
    container_name: readygo-frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
      # Backend URL for Next.js rewrites (proxy) - use Docker service name
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Remove volume mounts for production build, or use them only for development
    # volumes:
    #   - ../frontend:/app
    #   - /app/node_modules
    #   - /app/.next

  # Optional: OpenTelemetry Collector
  # otel-collector:
  #   image: otel/opentelemetry-collector:latest
  #   container_name: readygo-otel-collector
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
  #   ports:
  #     - "4317:4317"   # OTLP gRPC receiver
  #     - "4318:4318"   # OTLP HTTP receiver
  #     - "8888:8888"   # Prometheus metrics

  # Optional: Prometheus
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: readygo-prometheus
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'

volumes:
  postgres_data:
  redis_data:


